version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mitots_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mitots
      POSTGRES_PASSWORD: mitots123
      POSTGRES_DB: mitots_ai
    ports:
      - "6023:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data


volumes:
  postgres_data:

