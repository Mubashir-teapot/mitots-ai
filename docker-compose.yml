version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mitots_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mitots
      POSTGRES_PASSWORD: mitots123
      POSTGRES_DB: mitots_ai
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mitots_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ora-tech.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - '5050:80'
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
